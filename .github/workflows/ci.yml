name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Show assistant name in logs
        run: echo "Assistant: GitHub Copilot"
      - name: Run tests
        id: run-tests
        run: |
          mkdir -p test-logs
          # Ensure the pipeline returns a non-zero exit if any command fails
          set -o pipefail
          # Run tests and capture both stdout/stderr into a log file
          bun test --env=happy-dom 2>&1 | tee test-logs/tests.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-logs
